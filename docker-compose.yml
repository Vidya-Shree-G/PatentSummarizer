version: "3.9"

services:
  # ── Default: synthetic corpus, k=6 ────────────────────────────────────────
  patent-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: patent-pipeline:latest
    container_name: patent-pipeline
    volumes:
      - ./EVALUATIONS:/app/EVALUATIONS   # results appear on your host machine
    command: >
      python CODE/main.py
        --source synthetic
        --n 48
        --k 6
        --topics 6

  # ── Real USPTO patents via HuggingFace big_patent (5,000 docs) ────────────
  patent-pipeline-real:
    image: patent-pipeline:latest
    container_name: patent-pipeline-real
    volumes:
      - ./EVALUATIONS:/app/EVALUATIONS
    command: >
      python CODE/main.py
        --source bigpatent
        --n 5000
        --k 5
        --topics 5

  # ── Quick smoke-test (no viz, no report) ──────────────────────────────────
  patent-pipeline-test:
    image: patent-pipeline:latest
    container_name: patent-pipeline-test
    volumes:
      - ./EVALUATIONS:/app/EVALUATIONS
    command: >
      python CODE/main.py
        --source synthetic
        --n 48
        --k 6
        --topics 6
        --no-viz
        --no-report
